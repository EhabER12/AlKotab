name: Deploy Alkotab

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: alkotab-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.6.5"
  DEPLOY_PATH: "/var/www/alkotab"

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install API dependencies
        working-directory: api
        run: pnpm install --no-frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: web
        run: pnpm build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALKOTTAB_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ALKOTTAB_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          SSH_HOST: ${{ secrets.ALKOTTAB_SSH_HOST }}
          SSH_USER: ${{ secrets.ALKOTTAB_SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '${{ env.DEPLOY_PATH }}'"
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude "logs" \
            --exclude "api/uploads" \
            --exclude "web/public/uploads" \
            --exclude "api/.env" \
            --exclude "api/src/config/*.json" \
            --exclude "web/.env.production" \
            --exclude "web/.env.local" \
            --exclude "web/.env.*.local" \
            ./ "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/"

      - name: Run remote deploy
        env:
          SSH_HOST: ${{ secrets.ALKOTTAB_SSH_HOST }}
          SSH_USER: ${{ secrets.ALKOTTAB_SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "export DEPLOY_PATH='${{ env.DEPLOY_PATH }}' PNPM_VERSION='${{ env.PNPM_VERSION }}'; cd '${{ env.DEPLOY_PATH }}' && bash scripts/deploy-alkotab.sh"
